<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediPal | Login</title>
    <link rel="stylesheet" href="Login.css">
    <link rel="icon" href="C:\Users\King Theo\Downloads\logo.png" type="image/png">
</head>
<body>

<div class="login-wrapper">
    <div class="login-left">
        <img src="C:\Users\King Theo\Downloads\logo.png" alt="MediPal Logo" class="login-logo">
        <h1>MediPal</h1>
        <p>Login to access medicines, track your orders, and manage your pharmacy experience easily.</p>
    </div>
    <div class="login-right">
        <div class="login-card">
            <h2>Login</h2>
            <form>
                <input type="email" placeholder="Email Address" required>
                <input type="password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>
            <p>Don't have an account? <a href="Register.html">Register</a></p>
        </div>
    </div>
</div>

</body>
</html>
