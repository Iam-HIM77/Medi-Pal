<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediPal | Register</title>
    <link rel="stylesheet" href="Register.css">
    <link rel="icon" href="C:\Users\King Theo\Downloads\logo.png" type="image/png">
</head>
<body>

<div class="register-wrapper">
    <div class="register-left">
        <img src="C:\Users\King Theo\Downloads\logo.png" alt="MediPal Logo" class="register-logo">
        <h1>MediPal</h1>
        <p>Create an account to order medicines online, 
            track your orders, and get fast delivery from trusted pharmacies.</p>
    </div>
    <div class="register-right">
        <div class="register-card">
            <h2>Create Account</h2>
            <form>
                <input type="text" placeholder="Full Name" required>
                <input type="email" placeholder="Email Address" required>
                <input type="tel" placeholder="Phone Number" required>
                <input type="password" placeholder="Password" required>
                <input type="password" placeholder="Confirm Password" required>
                <button type="submit">Register</button>
            </form>
            <p>Already have an account? <a href="login.html">Login</a></p>
        </div>
    </div>
</div>

</body>
</html>
