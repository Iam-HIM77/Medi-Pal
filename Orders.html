<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediPal | My Orders</title>
    <link rel="stylesheet" href="css/orders.css">
    <link rel="icon" href="assets/images/logo.png" type="image/png">
</head>
<body>

<nav class="navbar">
    <div class="logo">
        <img class="medipal-logo" src="assets/images/logo.png" alt="MediPal Logo"> MediPal
    </div>
       <ul class="nav-links" id="navLinks">
            <li><a href="index.html">Home</a></li>
            <li><a href="medicines.html">Medicines</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="cart.html">Cart</a></li>
            <li><a href="login.html" id="loginNav">Login</a></li>
            <li><a href="register.html" id="registerNav">Register</a></li>
        </ul>
    <div class="cart-icon">
        <img src="assets/images/cart.png" alt="Cart">
        <span class="cart-count" id="cartCount">0</span>
    </div>
</nav>

<section class="orders-section">
    <div class="orders-container">
        <h1>My Orders</h1>
        <div class="order-filters">
            <button class="filter-btn active" data-status="all">All</button>
            <button class="filter-btn" data-status="pending">Pending</button>
            <button class="filter-btn" data-status="processing">Processing</button>
            <button class="filter-btn" data-status="shipped">Shipped</button>
            <button class="filter-btn" data-status="delivered">Delivered</button>
        </div>
        <div id="ordersList" class="orders-list"></div>
        <div id="noOrders" class="no-orders"><p>No orders found</p><a href="medicines.html" class="shop-btn">Start Shopping</a></div>
    </div>
</section>

<footer class="footer">
    <p>&copy; 2026 MediPal Online Pharmacy System</p>
</footer>

<script src="js/main.js"></script>
<script src="js/orders.js"></script>
</body>
</html>
