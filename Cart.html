<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediPal | Shopping Cart</title>
    <link rel="stylesheet" href="Cart.css">
    <link rel="icon" type="image/png" href="C:\Users\King Theo\Downloads\logo.png">
</head>
<body>

<nav class="navbar">
    <div class="logo">
        <img class="medipal-logo" src="C:\Users\King Theo\Downloads\logo.png" 
        alt="MediPal Logo">MediPal
    </div>
    <ul class="nav-links">
        <li><a href="Home.html">Home</a></li>
        <li><a href="Medicines.html">Medicines</a></li>
        <li><a href="About.html">About</a></li>
        <li><a href="Contact.html">Contact</a></li>
        <li><a href="Cart.html" class="active">Cart</a></li>
        <!--<li><a href="Login.html">Login</a></li>
        <li><a href="Register.html">Register</a></li>-->
    </ul>
    <div class="cart-icon">
        <img src="C:\Users\King Theo\Downloads\cart.png" alt="Cart">
        <span class="cart-count" id="cartCount">0</span>
    </div>
</nav>

<section class="cart-section">
    <div class="cart-container">
        <h1>Your Shopping Cart</h1>
        
        <div id="emptyCart" class="empty-cart">
            <p>Your cart is empty</p>
            <a href="Medicines.html" class="shop-btn">Continue Shopping</a>
        </div>
        
        <div id="cartContent">
            <div class="cart-items" id="cartItems"></div>
            
            <div class="cart-summary">
                <div class="summary-row">
                    <span>Subtotal:</span>
                    <span>GH₵<span id="subtotal">0.00</span></span>
                </div>
                <div class="summary-row">
                    <span>Delivery Fee:</span>
                    <span>GH₵5.00</span>
                </div>
                <div class="summary-row total">
                    <span>Total:</span>
                    <span>GH₵<span id="total">0.00</span></span>
                </div>
                <button class="checkout-btn" id="checkoutBtn">Proceed to Checkout</button>
            </div>
        </div>
    </div>
</section>

<footer class="footer">
    <p>&copy; 2026 MediPal Online Pharmacy System</p>
</footer>

<script src="Main.js"></script>
<script src="Cart.js"></script>
</body>
</html>
