<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediPal | Shopping Cart</title>
    <link rel="stylesheet" href="css/cart.css">
    <link rel="icon" type="image/png" href="assets/images/logo.png">
</head>
<body>

<nav class="navbar">
    <div class="logo">
        <img class="medipal-logo" src="assets/images/logo.png" alt="MediPal Logo">MediPal
    </div>
        <ul class="nav-links" id="navLinks">
            <li><a href="index.html">Home</a></li>
            <li><a href="medicines.html">Medicines</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="cart.html" class="active">Cart</a></li>
            <li><a href="login.html" id="loginNav">Login</a></li>
            <li><a href="register.html" id="registerNav">Register</a></li>
        </ul>
    <div class="cart-icon">
        <img src="assets/images/cart.png" alt="Cart">
        <span class="cart-count" id="cartCount">0</span>
    </div>
</nav>

<section class="cart-section">
    <div class="cart-container">
        <h1>Your Shopping Cart</h1>
        <div id="emptyCart" class="empty-cart">
            <p>Your cart is empty</p>
            <a href="medicines.html" class="shop-btn">Continue Shopping</a>
        </div>
        <div id="cartContent">
            <div class="cart-items" id="cartItems"></div>
            <div class="cart-summary">
                <div class="summary-row"><span>Subtotal:</span><span>GH₵<span id="subtotal">0.00</span></span></div>
                <div class="summary-row"><span>Delivery Fee:</span><span>GH₵5.00</span></div>
                <div class="summary-row total"><span>Total:</span><span>GH₵<span id="total">0.00</span></span></div>
                <button class="checkout-btn" id="checkoutBtn">Proceed to Checkout</button>
            </div>
        </div>
    </div>
</section>

<footer class="footer">
    <p>&copy; 2026 MediPal Online Pharmacy System</p>
</footer>

<script src="js/main.js"></script>
<script src="js/cart.js"></script>
</body>
</html>
